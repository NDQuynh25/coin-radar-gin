version: "2"
sql:
  - schema: "migrations/"
    queries: "internal/platform/timescale/queries.sql"
    gen:
      go:
        package: "timescale"
        out: "internal/platform/timescale"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: true
