app:
  env: "development" # development, production, staging

server:
  port: 9010
  read_timeout: 10
  write_timeout: 10

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres_password"
  name: "coin_radar"
  sslmode: "disable"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

telegram:
  token: "YOUR_TELEGRAM_BOT_TOKEN_HERE"
  channel_id: "YOUR_CHANNEL_ID_HERE"

ingestor:
  batch_size: 500
  flush_interval_ms: 1000
  buffer_size: 10000

exchanges:
  - name: binance
    enabled: true
    market: spot
    symbols: [BTCUSDT, ETHUSDT]
  - name: bybit
    enabled: true
    market: spot
    symbols: [BTCUSDT, ETHUSDT]
  - name: okx
    enabled: true
    market: spot
    symbols: [BTC-USDT, ETH-USDT]
